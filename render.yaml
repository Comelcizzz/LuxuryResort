# Render Blueprint — LuxuryResort (API + PostgreSQL + Static frontend)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: luxuryresort-db
    plan: free
    region: frankfurt
    databaseName: luxuryresort
    user: resort_user

services:
  - type: web
    name: luxuryresort-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: PGHOST
        fromDatabase:
          name: luxuryresort-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: luxuryresort-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: luxuryresort-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: luxuryresort-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: luxuryresort-db
          property: password
      - key: CORS_ORIGINS
        value: https://luxuryresort-web.onrender.com

  - type: web
    name: luxuryresort-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build:render
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: luxuryresort-api
          envVarKey: RENDER_EXTERNAL_URL
